name: Build Reverse Electron Driver

on:
  push:
    branches:
      - dev
  schedule:
    - cron: '0 0 * * 0' # Weekly, Sunday 00:00 UTC — refresh assets from the CDN
  workflow_dispatch:

jobs:
  build:
    name: Build & Package Windows Standalone Driver
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate offline UI assets
        run: python build_offline.py
        # Scrapes + downloads + URL-patches the upstream bundle into ./app

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: reverse-source
        run: npm install

      - name: Build & package (compile TS, copy UI, electron-packager)
        working-directory: reverse-source
        run: npm run package

      - name: Compress packaged build into ZIP
        shell: pwsh
        working-directory: reverse-source
        run: Compress-Archive -Path "dist-pkg\AJAZZ Reverse Driver-win32-x64\*" -DestinationPath ajazz-reverse-driver.zip

      - name: Upload compiled binary as Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ajazz-reverse-driver-windows
          path: reverse-source/ajazz-reverse-driver.zip
          retention-days: 30

      - name: Compute release tag (dev-YYMMDD-HHMM, UTC)
        id: tag
        shell: pwsh
        run: echo "tag=dev-$((Get-Date).ToUniversalTime().ToString('yyMMdd-HHmm'))" >> $env:GITHUB_OUTPUT

      - name: Publish artifact to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          prerelease: true
          files: reverse-source/ajazz-reverse-driver.zip
