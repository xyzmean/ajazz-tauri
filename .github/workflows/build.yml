name: Build Offline Electron Driver

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 0 * * 0' # Run once a week on Sunday at midnight UTC
  workflow_dispatch: # Enable manual triggering with a single click in GitHub Actions tab

jobs:
  build:
    name: Build & Package Windows Standalone Driver
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run offline builder script
        run: |
          python build_offline.py
        # This will download all JS modules, translations, and keyboard layout images from the server and patch relative paths.

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package.json

      - name: Install dependencies
        run: |
          npm install

      - name: Package Electron application
        run: |
          npx electron-packager . "AJAZZ Local Driver" --platform=win32 --arch=x64 --out=dist --overwrite

      - name: Compress packaged build into ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path dist\"AJAZZ Local Driver-win32-x64"\* -DestinationPath ajazz-local-driver.zip

      - name: Upload compiled binary as Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ajazz-local-driver-windows
          path: ajazz-local-driver.zip
          retention-days: 30

      - name: Compute release tag (YYMMDD-HHMM, UTC)
        id: tag
        shell: pwsh
        run: echo "tag=$((Get-Date).ToUniversalTime().ToString('yyMMdd-HHmm'))" >> $env:GITHUB_OUTPUT

      - name: Publish artifact to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: ajazz-local-driver.zip
