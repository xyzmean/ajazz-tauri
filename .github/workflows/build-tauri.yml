name: Build Tauri Driver

on:
  push:
    branches:
      - tauri
  workflow_dispatch:

jobs:
  build:
    name: Build & Package Windows Tauri Driver
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: tauri-app
        run: npm install

      - name: Compute release tag (tauri-YYMMDD-HHMM, UTC)
        id: tag
        shell: pwsh
        run: echo "tag=tauri-$((Get-Date).ToUniversalTime().ToString('yyMMdd-HHmm'))" >> $env:GITHUB_OUTPUT

      - name: Build Tauri app & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri-app
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: ${{ steps.tag.outputs.tag }}
          prerelease: true
