name: Build Tauri Driver

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build & Package Windows Tauri Driver
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Read pinned reverse commit
        id: rev
        shell: bash
        run: echo "sha=$(tr -d '[:space:]' < .reverse-rev)" >> "$GITHUB_OUTPUT"

      - name: Checkout ajazz-driver-reverse at pinned commit
        uses: actions/checkout@v4
        with:
          repository: xyzmean/ajazz-driver-reverse
          ref: ${{ steps.rev.outputs.sha }}
          path: .reverse-src

      - name: Sync canonical model table from reverse
        shell: bash
        run: |
          set -e
          src=".reverse-src/models.json"
          dst="src-tauri/models.json"
          if [ ! -f "$src" ]; then
            echo "::error::models.json not found in reverse@${{ steps.rev.outputs.sha }}"
            exit 1
          fi
          cp "$src" "$dst"
          echo "Synced $dst from reverse@${{ steps.rev.outputs.sha }}"
          git --no-pager diff --stat -- "$dst" || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Compute release tag (tauri-YYMMDD-HHMM, UTC)
        id: tag
        shell: pwsh
        run: echo "tag=tauri-$((Get-Date).ToUniversalTime().ToString('yyMMdd-HHmm'))" >> $env:GITHUB_OUTPUT

      - name: Build Tauri app & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: ${{ steps.tag.outputs.tag }}
          prerelease: true
          releaseBody: "Reverse protocol pinned at reverse@${{ steps.rev.outputs.sha }}"
